version: "3.3"

services:
  mysqldb:
    image: mysql:8.0
    container_name: mysql_raffle
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    volumes:
      - ./dbinit/init.sql:/docker-entrypoint-initdb.d/0_init.sql
    ports:
      - "3306:3306"
    expose:
      - 3306
    environment:
      MYSQL_DATABASE: raffle_picker
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql_raffle
    networks:
      - rafflenet

networks:
  rafflenet:
    driver: bridge

